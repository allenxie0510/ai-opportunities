<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 趋势周报 · 独立创作者复利创业方向</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0a0a0a;
    --ink-strong: #000000;
    --charcoal: #222222;
    --slate: #45515e;
    --steel: #5f5f5f;
    --stone: #8e8e93;
    --muted: #a8aab2;
    --canvas: #ffffff;
    --surface: #f7f8fa;
    --surface-soft: #f2f3f5;
    --hairline: #e5e7eb;
    --hairline-soft: #eaecf0;
    --coral: #ff5530;
    --magenta: #ea5ec1;
    --blue: #1456f0;
    --blue-deep: #1d4ed8;
    --blue-200: #bfdbfe;
    --purple: #a855f7;
    --success-bg: #e8ffea;
    --success-text: #1ba673;
    --on-dark: #ffffff;
    --footer-bg: #0a0a0a;
    --font: 'DM Sans', Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font);
    background: var(--canvas);
    color: var(--charcoal);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ═══ NAV ═══ */
  .nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(255,255,255,0.88);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 1px solid var(--hairline-soft);
  }
  .nav-inner {
    max-width: 1280px; margin: 0 auto; padding: 0 32px;
    display: flex; align-items: center; justify-content: space-between; height: 56px;
  }
  .nav-left { display: flex; align-items: center; gap: 28px; }
  .nav .brand {
    font-size: 16px; font-weight: 700; letter-spacing: -0.01em; color: var(--ink);
    display: flex; align-items: center; gap: 8px; text-decoration: none;
  }
  .nav .brand .dot { width: 7px; height: 7px; background: var(--coral); border-radius: 50%; }
  .nav-links { display: flex; align-items: center; gap: 4px; }
  .nav-links a {
    font-size: 14px; font-weight: 500; color: var(--steel); text-decoration: none;
    padding: 6px 14px; border-radius: 9999px; transition: all 0.2s ease;
  }
  .nav-links a:hover { color: var(--ink); background: var(--surface); }
  .nav-links a.current { color: var(--ink); font-weight: 600; }
  .nav .fav-link { position: relative; display: flex; align-items: center; gap: 4px; }
  .nav .fav-badge { display: none; background: var(--coral); color: #fff; font-size: 11px; font-weight: 600; padding: 1px 7px; border-radius: 9999px; }
  .nav .fav-link.has-items .fav-badge { display: inline-flex; }

  .container { max-width: 1280px; margin: 0 auto; padding: 0 32px; }

  /* ═══ HERO ═══ */
  .hero { padding: 80px 0 56px; text-align: center; }
  .hero .eyebrow {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 600; color: var(--coral);
    background: #ff553010; padding: 4px 14px; border-radius: 9999px;
    margin-bottom: 24px;
  }
  .hero h1 {
    font-size: 64px; font-weight: 600; line-height: 1.10; letter-spacing: -1.5px;
    color: var(--ink); max-width: 800px; margin: 0 auto 16px;
  }
  .hero .sub {
    font-size: 18px; font-weight: 500; color: var(--steel);
    max-width: 540px; margin: 0 auto; line-height: 1.5;
  }
  .hero .meta {
    margin-top: 28px; font-size: 14px; color: var(--stone);
    display: flex; align-items: center; justify-content: center; gap: 16px; flex-wrap: wrap;
  }
  .hero .meta .dot-sep { width: 3px; height: 3px; background: var(--muted); border-radius: 50%; }

  /* ═══ STATS STRIP ═══ */
  .stats-strip {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px;
    background: var(--hairline); border-radius: 16px; overflow: hidden;
    margin-bottom: 56px;
  }
  .stats-strip .item {
    background: var(--canvas); padding: 28px 24px; text-align: center;
    transition: background 0.2s ease;
  }
  .stats-strip .item:hover { background: var(--surface); }
  .stats-strip .num {
    font-size: 40px; font-weight: 600; letter-spacing: -1px; line-height: 1.2; color: var(--ink);
  }
  .stats-strip .lbl { font-size: 14px; font-weight: 500; color: var(--steel); margin-top: 2px; }

  /* ═══ FILTERS ═══ */
  .filter-section { margin-bottom: 40px; }
  .filter-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 6px; }
  .filter-row .flabel {
    font-size: 12px; font-weight: 600; color: var(--stone);
    letter-spacing: 0.04em; text-transform: uppercase; margin-right: 4px;
  }
  .filter-row .vr { color: var(--hairline); margin: 0 8px; font-size: 0.7rem; }
  .fbtn {
    font-size: 14px; font-weight: 500; color: var(--steel);
    background: var(--canvas); border: 1px solid var(--hairline); border-radius: 9999px;
    padding: 6px 18px; cursor: pointer; transition: all 0.2s ease; white-space: nowrap;
  }
  .fbtn:hover { border-color: var(--muted); color: var(--ink); }
  .fbtn.on {
    background: var(--ink); color: #fff; border-color: var(--ink); font-weight: 600;
  }
  .results-hint { font-size: 13px; color: var(--stone); margin-top: 16px; font-weight: 500; }

  /* ═══ ARTICLE LIST ═══ */
  .article-list { display: flex; flex-direction: column; gap: 16px; margin-bottom: 80px; }
  .article {
    background: var(--canvas); border-radius: 16px; padding: 32px;
    border: 1px solid var(--hairline); transition: border-color 0.2s ease;
  }
  .article:hover { border-color: var(--muted); }

  /* Top header row */
  .article .art-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .art-cat-pill {
    font-size: 12px; font-weight: 600; letter-spacing: 0.03em; text-transform: uppercase;
    color: #fff; padding: 4px 12px; border-radius: 9999px;
  }
  .art-cat-pill.cat-microsaas { background: #2563eb; }
  .art-cat-pill.cat-design { background: #ec4899; }
  .art-cat-pill.cat-automation { background: #8b5cf6; }
  .art-cat-pill.cat-content { background: #10b981; }
  .art-cat-pill.cat-tool { background: #f59e0b; }
  .art-cat-pill.cat-digital { background: #6366f1; }
  .article .art-idx { font-size: 13px; font-weight: 600; color: var(--muted); margin-left: auto; }

  /* Bookmark icon button */
  .bookmark-btn {
    display: inline-flex; align-items: center; justify-content: center;
    background: transparent; border: none; border-radius: 8px;
    padding: 4px; font-family: inherit;
    color: var(--muted); cursor: pointer; transition: all 0.2s ease;
    margin-left: 8px; width: 28px; height: 28px;
  }
  .bookmark-btn:hover { color: var(--coral); background: #ff55300d; }
  .bookmark-btn.faved { color: var(--coral); }
  .bookmark-btn.faved svg path { fill: var(--coral); stroke: var(--coral); }

  .article h3 {
    font-size: 24px; font-weight: 600; line-height: 1.30; letter-spacing: -0.01em;
    color: var(--ink); margin-bottom: 8px;
  }
  .article .desc {
    font-size: 16px; font-weight: 400; color: var(--slate); line-height: 1.5;
    margin-bottom: 18px; max-width: 780px;
  }

  /* Meta indicators */
  .art-meta { display: flex; gap: 28px; flex-wrap: wrap; margin-bottom: 16px; }
  .art-meta .mi { display: flex; flex-direction: column; gap: 2px; }
  .art-meta .mi .ml { font-size: 11px; font-weight: 600; color: var(--stone); text-transform: uppercase; letter-spacing: 0.05em; }
  .art-meta .mi .mv { font-size: 15px; font-weight: 600; color: var(--ink); }

  /* Action pills row */
  .art-pills { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 0; }
  .pill {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 13px; font-weight: 500; padding: 5px 14px; border-radius: 9999px;
    border: 1px solid var(--hairline); background: transparent; color: var(--steel);
    text-decoration: none; transition: all 0.2s ease;
  }
  .pill:hover { border-color: var(--muted); color: var(--ink); }
  .pill.link { color: var(--blue); border-color: #1456f020; background: #1456f008; }
  .pill.link:hover { border-color: var(--blue); background: #1456f012; color: var(--blue-deep); }
  .pill.insight-tgl {
    cursor: pointer; margin-left: auto; border-style: dashed; font-family: inherit;
    font-size: 13px; font-weight: 500; color: var(--stone);
  }
  .pill.insight-tgl:hover { color: var(--ink); border-color: var(--muted); }

  /* Insight panel */
  .insight-panel {
    display: none; margin-top: 16px; padding: 16px 20px;
    background: var(--surface); border-radius: 12px;
    font-size: 14px; color: var(--slate); line-height: 1.5;
  }
  .insight-panel.open { display: block; }
  .insight-panel strong { color: var(--ink); font-weight: 600; }
  .insight-panel em { color: var(--coral); font-style: normal; font-weight: 500; }

  /* ═══ FOOTER ═══ */
  footer {
    background: var(--footer-bg); color: var(--muted); padding: 56px 32px 48px;
    text-align: center; font-size: 14px; line-height: 1.8;
  }
  footer p + p { margin-top: 4px; }

  /* ═══ TOAST ═══ */
  .toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: #fff; padding: 11px 28px;
    border-radius: 9999px; font-size: 14px; font-weight: 600;
    z-index: 999; opacity: 0; transition: opacity 0.3s ease;
    pointer-events: none; box-shadow: 0 4px 16px rgba(0,0,0,0.18);
  }
  .toast.show { opacity: 1; }

  @media (max-width: 1024px) {
    .hero h1 { font-size: 48px; letter-spacing: -1px; }
  }
  @media (max-width: 768px) {
    .container { padding: 0 20px; }
    .nav-inner { padding: 0 20px; }
    .hero { padding: 56px 0 40px; }
    .hero h1 { font-size: 36px; }
    .stats-strip { grid-template-columns: repeat(2, 1fr); }
    .article { padding: 24px 20px; }
    .art-header { flex-wrap: wrap; }
    .bookmark-btn { margin-left: 0; width: 24px; height: 24px; }
  }
  @media (max-width: 480px) {
    .hero h1 { font-size: 28px; letter-spacing: -0.5px; }
    .stats-strip { grid-template-columns: 1fr 1fr; }
    .stats-strip .num { font-size: 32px; }
  }

  /* ═══ SHARE BAR ═══ */
  .share-bar { display: flex; gap: 8px; justify-content: center; margin-bottom: 40px; flex-wrap: wrap; }
  .share-btn {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: inherit; font-size: 13px; font-weight: 500;
    padding: 8px 18px; border-radius: 9999px; cursor: pointer;
    border: 1px solid var(--hairline); background: var(--surface);
    color: var(--steel); transition: all 0.2s ease;
  }
  .share-btn:hover { border-color: var(--muted); color: var(--ink); background: var(--surface-soft); }

  .hidden { display: none !important; }

  @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  .article { animation: fadeUp 0.4s ease both; }
  .article:nth-child(1) { animation-delay: 0.02s; }
  .article:nth-child(2) { animation-delay: 0.05s; }
  .article:nth-child(3) { animation-delay: 0.08s; }
  .article:nth-child(4) { animation-delay: 0.11s; }
  .article:nth-child(5) { animation-delay: 0.14s; }
  .article:nth-child(6) { animation-delay: 0.17s; }
  .article:nth-child(7) { animation-delay: 0.20s; }
  .article:nth-child(8) { animation-delay: 0.23s; }
  .article:nth-child(9) { animation-delay: 0.26s; }
  .article:nth-child(10) { animation-delay: 0.29s; }
  .article:nth-child(11) { animation-delay: 0.32s; }
  .article:nth-child(12) { animation-delay: 0.35s; }
  @keyframes heroIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  .hero .eyebrow { animation: heroIn 0.5s ease both; }
  .hero h1 { animation: heroIn 0.5s 0.06s ease both; }
  .hero .sub { animation: heroIn 0.5s 0.12s ease both; }
  .hero .meta { animation: heroIn 0.5s 0.18s ease both; }
</style>
</head>
