<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>往期报告 · AI 趋势周报</title>
<style>
  :root {
    --bg: #f5f5f7;
    --surface: #ffffff;
    --text: #1d1d1f;
    --text-secondary: #86868b;
    --text-tertiary: #aeaeb2;
    --border: #e5e5ea;
    --accent: #0071e3;
    --radius: 16px;
    --radius-sm: 10px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  .container { max-width: 720px; margin: 0 auto; padding: 0 24px; }

  nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 0; margin-bottom: 60px;
  }
  nav .brand {
    font-family: 'Bebas Neue', 'Helvetica Neue Condensed', Impact, sans-serif;
    font-size: 22px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
    color: var(--text); text-decoration: none;
  }
  nav a {
    font-size: 0.85rem; color: var(--accent); text-decoration: none;
    font-weight: 500; transition: opacity 0.2s;
  }
  nav a:hover { opacity: 0.7; }

  header { margin-bottom: 48px; }
  header h1 { font-size: 2.2rem; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 8px; }
  header p { color: var(--text-secondary); font-size: 0.95rem; }

  .list { display: flex; flex-direction: column; gap: 1px; background: var(--border); border-radius: var(--radius); overflow: hidden; }
  .list-item {
    background: var(--surface); padding: 20px 24px; display: flex;
    align-items: center; justify-content: space-between; text-decoration: none;
    transition: background 0.2s;
  }
  .list-item:hover { background: #fafafa; }
  .list-item .week-label { font-weight: 600; color: var(--text); font-size: 0.95rem; letter-spacing: -0.01em; }
  .list-item .date { color: var(--text-secondary); font-size: 0.8rem; }
  .list-item .arrow { color: var(--text-tertiary); font-size: 0.9rem; transition: transform 0.2s; }
  .list-item:hover .arrow { transform: translateX(3px); color: var(--accent); }

  .empty { text-align: center; padding: 60px 0; color: var(--text-secondary); }
  footer { text-align: center; padding: 48px 0; color: var(--text-tertiary); font-size: 0.8rem; }
</style>
</head>
<body>
<div class="container">
  <nav>
    <a href="/" class="brand">AI OPC Weekly</a>
    <a href="/">← 返回主页</a>
  </nav>
  <header>
    <h1>往期报告</h1>
    <p>所有历史周报归档</p>
  </header>
  <div class="list" id="archiveList">
    <div class="empty">加载中…</div>
  </div>
  <footer>Vercel 自动部署 · 每周一更新</footer>
</div>
<script>
fetch('manifest.json')
  .then(r => r.json())
  .then(data => {
    const list = document.getElementById('archiveList');
    if (!data.weeks || data.weeks.length === 0) {
      list.innerHTML = '<div class="empty">暂无往期报告</div>';
      return;
    }
    list.innerHTML = data.weeks.map(w =>
      `<a class="list-item" href="${w.file}">
        <span class="week-label">${w.label}</span>
        <span class="date">${w.date}</span>
        <span class="arrow">→</span>
      </a>`
    ).join('');
  })
  .catch(() => {
    document.getElementById('archiveList').innerHTML = '<div class="empty">暂无往期报告</div>';
  });
</script>
</body>
</html>
