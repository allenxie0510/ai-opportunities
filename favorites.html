<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的收藏 · AI 趋势周报</title>
<style>
  :root {
    --bg: #f5f5f7;
    --surface: #ffffff;
    --text: #1d1d1f;
    --text-secondary: #6e6e73;
    --text-tertiary: #aeaeb2;
    --border: #e5e5ea;
    --border-light: #f0f0f2;
    --accent: #0071e3;
    --favorite-gold: #ff9500;
    --radius: 20px;
    --radius-sm: 14px;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.06);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.08);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.5; -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  /* ── Nav ── */
  .nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(245,245,247,0.78);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 1px solid var(--border);
  }
  .nav-inner {
    max-width: 1060px; margin: 0 auto; padding: 0 24px;
    display: flex; align-items: center; justify-content: space-between; height: 48px;
  }
  .nav-left { display: flex; align-items: center; gap: 24px; }
  .nav .brand {
    font-size: 0.88rem; font-weight: 600; letter-spacing: -0.01em; color: var(--text);
    display: flex; align-items: center; gap: 8px; text-decoration: none;
  }
  .nav .brand .dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; }
  .nav a {
    font-size: 0.8rem; color: var(--text-secondary); text-decoration: none;
    padding: 6px 12px; border-radius: 6px; transition: all 0.2s; font-weight: 450;
  }
  .nav a:hover { color: var(--text); background: rgba(0,0,0,0.04); }
  .nav a.current { color: var(--accent); font-weight: 500; }

  .container { max-width: 1060px; margin: 0 auto; padding: 0 24px; }

  /* ── Header ── */
  .page-header { padding: 48px 0 32px; }
  .page-header h1 {
    font-size: 2rem; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 4px;
  }
  .page-header .sub { color: var(--text-secondary); font-size: 0.9rem; }

  /* ── Empty state ── */
  .empty-state {
    text-align: center; padding: 80px 20px;
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 16px; }
  .empty-state h2 { font-size: 1.3rem; font-weight: 600; margin-bottom: 8px; }
  .empty-state p { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 20px; }
  .empty-state a { color: var(--accent); text-decoration: none; font-weight: 500; }

  /* ── Card List ── */
  .fav-list { display: flex; flex-direction: column; gap: 16px; margin-bottom: 64px; }
  .fav-card {
    background: var(--surface); border-radius: var(--radius-sm);
    padding: 24px 28px; box-shadow: var(--shadow-sm); border: 1px solid var(--border-light);
    transition: box-shadow 0.3s ease; position: relative;
  }
  .fav-card:hover { box-shadow: var(--shadow-md); }
  .fav-card .top-row { margin-bottom: 12px; }
  .fav-card .top-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .fav-card .cat-badge {
    display: inline-block; font-size: 0.65rem; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
    color: var(--accent); background: #0071e312; padding: 2px 10px; border-radius: 5px;
  }
  .fav-card h3 {
    font-size: 1.1rem; font-weight: 650; letter-spacing: -0.015em; line-height: 1.3; margin-bottom: 6px;
  }
  .fav-card .desc {
    font-size: 0.82rem; color: var(--text-secondary); line-height: 1.6; margin-bottom: 10px;
  }
  .fav-card .meta-row {
    display: flex; gap: 16px; flex-wrap: wrap; font-size: 0.72rem; color: var(--text-tertiary);
  }
  .fav-card .meta-row span { display: flex; align-items: center; gap: 4px; }
  .fav-card .actions {
    display: flex; gap: 8px; align-items: center; margin-top: 10px;
  }
  .btn {
    font-size: 0.78rem; font-weight: 500; border: none; border-radius: 8px;
    padding: 8px 18px; cursor: pointer; transition: all 0.2s ease;
    font-family: inherit; white-space: nowrap;
  }
  .btn-analyze {
    background: var(--accent); color: #fff;
  }
  .btn-analyze:hover { background: #0077ed; transform: translateY(-1px); }
  .btn-remove {
    background: transparent; color: var(--text-tertiary); padding: 8px 12px;
    font-size: 1rem;
  }
  .btn-remove:hover { color: #ff3b30; background: rgba(255,59,48,0.06); }

  /* ── Analysis result badge ── */
  .eval-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 0.7rem; font-weight: 600; padding: 4px 10px; border-radius: 12px;
    margin-top: 12px;
  }
  .eval-badge.done { background: #34c75918; color: #34c759; }
  .eval-badge.pending { background: #ff950018; color: #ff9500; }

  /* ── Evaluation result panel ── */
  .eval-result {
    margin-top: 16px; padding: 20px; background: #f9f9fb; border-radius: 12px;
    border-left: 3px solid var(--accent); display: none;
  }
  .eval-result.show { display: block; }
  .eval-result h4 { font-size: 0.85rem; font-weight: 650; margin-bottom: 12px; color: var(--accent); }
  .eval-dim {
    display: grid; grid-template-columns: 120px 1fr; gap: 8px 16px;
    font-size: 0.78rem; line-height: 1.7; margin-bottom: 12px;
  }
  .eval-dim .dim-label { color: var(--text-tertiary); font-weight: 500; text-align: right; }
  .eval-dim .dim-value { color: var(--text); }
  .eval-overall {
    padding-top: 12px; border-top: 1px solid var(--border-light);
    font-size: 0.82rem; color: var(--text); line-height: 1.7;
  }
  .eval-overall strong { color: var(--accent); }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.25s ease;
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  }
  .modal-overlay.open { opacity: 1; pointer-events: auto; }
  .modal {
    background: var(--surface); border-radius: var(--radius);
    padding: 32px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15); transform: translateY(8px);
    transition: transform 0.25s ease;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal h3 { font-size: 1.2rem; font-weight: 650; letter-spacing: -0.015em; margin-bottom: 8px; }
  .modal .project-name { color: var(--accent); }
  .modal .modal-desc { color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 20px; line-height: 1.6; }
  .modal textarea {
    width: 100%; min-height: 240px; padding: 16px;
    border: 1px solid var(--border); border-radius: 10px;
    font-family: 'SF Mono', 'Menlo', 'Monaco', monospace; font-size: 0.78rem;
    line-height: 1.6; color: var(--text); background: #fafafa;
    resize: vertical; margin-bottom: 16px;
  }
  .modal .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
  .btn-copy { background: var(--text); color: #fff; }
  .btn-copy:hover { background: #333; }
  .btn-close { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
  .btn-close:hover { border-color: #c0c0c8; }
  .btn-copied { background: #34c759; color: #fff; }

  /* Toast */
  .toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    background: var(--text); color: #fff; padding: 10px 24px;
    border-radius: 20px; font-size: 0.85rem; font-weight: 500;
    z-index: 999; opacity: 0; transition: opacity 0.3s ease;
    pointer-events: none; box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }
  .toast.show { opacity: 1; }

  footer {
    border-top: 1px solid var(--border); padding: 40px 0 56px;
    text-align: center; color: var(--text-tertiary); font-size: 0.78rem; line-height: 1.8;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fav-card { animation: fadeIn 0.4s ease both; }
  .fav-card:nth-child(1) { animation-delay: 0.02s; }
  .fav-card:nth-child(2) { animation-delay: 0.05s; }
  .fav-card:nth-child(3) { animation-delay: 0.08s; }
  .fav-card:nth-child(4) { animation-delay: 0.11s; }
  .fav-card:nth-child(5) { animation-delay: 0.14s; }
  .fav-card:nth-child(6) { animation-delay: 0.17s; }
  .fav-card:nth-child(7) { animation-delay: 0.20s; }
  .fav-card:nth-child(8) { animation-delay: 0.23s; }
  .fav-card:nth-child(9) { animation-delay: 0.26s; }
  .fav-card:nth-child(10) { animation-delay: 0.29s; }
  .fav-card:nth-child(11) { animation-delay: 0.32s; }
  .fav-card:nth-child(12) { animation-delay: 0.35s; }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <div class="nav-left">
      <a href="/" class="brand"><span class="dot"></span>AI 趋势周报</a>
      <a href="/">← 返回最新</a>
    </div>
  </div>
</nav>

<div class="container">

<div class="page-header">
  <h1>★ 我的收藏</h1>
  <p class="sub">已保存的创业方向 · 点击「AI 评估」获取深度拆解分析</p>
</div>

<div id="favContainer">
  <div class="empty-state" id="emptyState">
    <div class="icon">☆</div>
    <h2>还没有收藏</h2>
    <p>回到<a href="/">主页</a>，点击项目卡片右上角的 ☆ 即可收藏</p>
  </div>
  <div class="fav-list" id="favList" style="display:none;"></div>
</div>

<footer>
  <p>收藏数据保存在浏览器本地 · 清除缓存会丢失</p>
</footer>
</div>

<!-- ── AI Evaluation Modal ── -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>AI 深度评估：<span class="project-name" id="modalProjectName"></span></h3>
    <p class="modal-desc" id="modalProjectDesc"></p>
    <textarea id="modalPrompt" readonly></textarea>
    <div class="modal-actions">
      <button class="btn btn-close" onclick="closeModal()">关闭</button>
      <button class="btn btn-copy" id="btnCopy" onclick="copyPrompt()">📋 复制评估指令</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'ai_trends_favorites';
const EVAL_KEY = 'ai_trends_evaluations';

function getFavorites() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e) { return []; }
}

function saveFavorites(favs) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(favs));
}

function getEvaluations() {
  try { return JSON.parse(localStorage.getItem(EVAL_KEY)) || {}; } catch(e) { return {}; }
}

function saveEvaluations(evals) {
  localStorage.setItem(EVAL_KEY, JSON.stringify(evals));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._timeout);
  t._timeout = setTimeout(() => t.classList.remove('show'), 2000);
}

// ── Render favorites ──
function renderFavorites() {
  const favs = getFavorites();
  const emptyState = document.getElementById('emptyState');
  const favList = document.getElementById('favList');
  const evals = getEvaluations();

  if (favs.length === 0) {
    emptyState.style.display = '';
    favList.style.display = 'none';
    return;
  }

  emptyState.style.display = 'none';
  favList.style.display = '';

  favList.innerHTML = favs.map(f => {
    const e = evals[f.id];
    const hasEval = e && e.dimensions;
    const metricsHTML = f.metrics ? f.metrics.map(m => `<span>${m.label} <strong>${m.value}</strong></span>`).join('') : '';

    let evalHTML = '';
    if (hasEval) {
      const dimsHTML = Object.entries(e.dimensions).map(([k, v]) =>
        `<div class="dim-label">${k}</div><div class="dim-value">${v}</div>`
      ).join('');
      evalHTML = `
        <span class="eval-badge done">✓ 已评估</span>
        <div class="eval-result show">
          <h4>📊 AI 创业维度评估</h4>
          <div class="eval-dim">${dimsHTML}</div>
          <div class="eval-overall">${e.overall || ''}</div>
        </div>`;
    } else {
      evalHTML = '<span class="eval-badge pending">⏳ 待评估</span>';
    }

    return `
      <div class="fav-card">
        <div class="top-row">
          <span class="cat-badge">${f.section || ''}</span>
          <span style="font-size:0.68rem;color:var(--text-tertiary);margin-left:auto;">收藏于 ${new Date(f.savedAt).toLocaleDateString('zh-CN')}</span>
        </div>
        <h3>📌 ${f.title}</h3>
        <p class="desc">${f.desc}</p>
        <div class="meta-row">${metricsHTML}</div>
        <div class="actions">
          <button class="btn btn-analyze" onclick="openEvaluation('${f.id}')" ${hasEval ? 'style="opacity:0.5"' : ''}>${hasEval ? '重新评估' : '🔍 AI 深度评估'}</button>
          <button class="btn btn-remove" onclick="removeFav('${f.id}')" title="取消收藏">✕ 移除</button>
        </div>
        ${evalHTML}
      </div>`;
  }).join('');
}

// ── Remove ──
function removeFav(id) {
  let favs = getFavorites();
  favs = favs.filter(f => f.id !== id);
  saveFavorites(favs);
  renderFavorites()
}

// ── Evaluation Modal ──
function openEvaluation(id) {
  const favs = getFavorites();
  const f = favs.find(x => x.id === id);
  if (!f) return;

  const dimensions = [
    '市场规模与增长潜力',
    '竞争格局与差异化空间',
    '商业模式与变现路径',
    '技术可行性（Vibe Coding 可实现程度）',
    '复利效应评估（数据/网络/品牌）',
    '进入壁垒与护城河',
    '目标用户画像与获客策略',
    'MVP 最小可行产品路径（含时间估算）',
    '核心风险与应对策略',
    '综合创业建议与行动清单'
  ];

  const prompt = `请对以下 AI 创业方向进行深度拆解分析：

【项目名称】${f.title}
【所属赛道】${f.section || ''}
【项目描述】${f.desc}
【创作者洞察】${f.insight || ''}
${f.metrics ? '【关键指标】' + f.metrics.map(m => m.label + ': ' + m.value).join('、') : ''}

请从以下 ${dimensions.length} 个维度逐一评估，每个维度给出 2-4 句话的实质性分析：

${dimensions.map((d, i) => (i+1) + '. ' + d).join('\n')}

输出格式要求：
- 每个维度以【维度名】开头
- 最后给出总体评分（1-10分）及一句话总结
- 分析要具体、可操作，避免泛泛而谈
- 针对独立创作者/AI Vibe Coder 的视角`;

  document.getElementById('modalProjectName').textContent = f.title;
  document.getElementById('modalProjectDesc').textContent = f.desc;
  document.getElementById('modalPrompt').value = prompt;
  document.getElementById('modalOverlay').classList.add('open');

  // Reset copy button
  const btn = document.getElementById('btnCopy');
  btn.textContent = '📋 复制评估指令';
  btn.className = 'btn btn-copy';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function copyPrompt() {
  const textarea = document.getElementById('modalPrompt');
  navigator.clipboard.writeText(textarea.value).then(() => {
    const btn = document.getElementById('btnCopy');
    btn.textContent = '✓ 已复制';
    btn.className = 'btn btn-copied';
    showToast('评估指令已复制！粘贴发送给 OpenClaw 即可获得深度分析');
  });
}

// Close modal on overlay click
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// Keyboard: ESC to close
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

// ── Init ──
renderFavorites();
</script>
</body>
</html>
